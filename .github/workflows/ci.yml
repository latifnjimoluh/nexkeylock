name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  qualite:
    name: Format, Clippy et tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Installer la chaîne d'outils (depuis rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Vérifier le formatage
        run: cargo fmt --all --check
      - name: Clippy (zéro avertissement)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests du workspace
        run: cargo test --workspace --all-features

  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Installer cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  couverture:
    name: Couverture (cargo-llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Installer cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Mesurer la couverture (pm-crypto et pm-core)
        run: >-
          cargo llvm-cov --workspace --all-features
          --lcov --output-path lcov.info
          --fail-under-lines 90
          -p nex-cryptographie -p nex-coffre
      - name: Publier le rapport lcov
        uses: actions/upload-artifact@v4
        with:
          name: couverture-lcov
          path: lcov.info

  # Le fuzz smoke (cargo-fuzz) sera activé au Jalon 1/7 quand les cibles
  # existeront (désérialiseur d'en-tête, parseur de format, routine AEAD).
