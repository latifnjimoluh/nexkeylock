name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUSTFLAGS: "-D warnings"

jobs:
  qualite:
    name: Format, Clippy et tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - name: Installer la chaîne d'outils (depuis rust-toolchain.toml)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
      - name: Vérifier le formatage
        run: cargo fmt --all --check
      - name: Clippy (zéro avertissement)
        run: cargo clippy --all-targets --all-features -- -D warnings
      - name: Tests du workspace
        run: cargo test --workspace --all-features

  audit:
    name: Audit des dépendances
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
      - name: Installer cargo-audit
        run: cargo install cargo-audit --locked
      - name: cargo audit
        run: cargo audit

  couverture:
    name: Couverture (cargo-llvm-cov)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview
      - uses: Swatinem/rust-cache@v2
      - name: Installer cargo-llvm-cov
        run: cargo install cargo-llvm-cov --locked
      - name: Mesurer la couverture (pm-crypto et pm-core)
        # `-p` cible les deux crates cœur ; incompatible avec `--workspace`.
        run: >-
          cargo llvm-cov --all-features
          --lcov --output-path lcov.info
          --fail-under-lines 90
          -p nex-cryptographie -p nex-coffre
      - name: Publier le rapport lcov
        uses: actions/upload-artifact@v5
        with:
          name: couverture-lcov
          path: lcov.info

  fuzz:
    name: Fuzz smoke (nightly)
    runs-on: ubuntu-latest
    # `rust-toolchain.toml` épingle la stable 1.95.0 ; cargo-fuzz exige la
    # nightly (`-Z sanitizer`). `RUSTUP_TOOLCHAIN` prime sur le fichier et force
    # la nightly pour toutes les invocations de cargo de ce job.
    env:
      RUSTUP_TOOLCHAIN: nightly
    steps:
      - uses: actions/checkout@v5
      - uses: dtolnay/rust-toolchain@nightly
      - uses: Swatinem/rust-cache@v2
      - name: Installer cargo-fuzz
        run: cargo install cargo-fuzz --locked
      - name: Passage de fuzz court sur chaque cible
        run: |
          for cible in decoder_fichier ouvrir_fichier aead_dechiffrer; do
            cargo fuzz run "$cible" -- -max_total_time=20 -runs=50000
          done
